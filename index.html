<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD-Card | خدمة إلكترونية ليبية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00ff88; --text-main: #ffffff; --text-muted: #8b949e; --border: #30363d; --error: #ff4d4d; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; padding-bottom: 100px; line-height: 1.6; }

        /* واجهة الدخول */
        #authSection { display: none; padding-top: 50px; text-align: center; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); max-width: 380px; margin: auto; }

        /* الهيدر */
        .app-header { display: flex; align-items: center; justify-content: center; padding: 15px 0; background: var(--card); border-bottom: 1px solid var(--border); margin-bottom: 20px; border-radius: 0 0 20px 20px; }
        .app-logo { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; margin-left: 10px; }
        .app-title { font-size: 22px; font-weight: 800; color: var(--accent); }

        /* الرصيد والربح بجانب بعض */
        .stats-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: var(--card); border-radius: 18px; padding: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; }
        .stat-card:active { transform: scale(0.95); }
        .stat-title { font-size: 16px; font-weight: 800; color: var(--accent); display: block; }
        .stat-desc { font-size: 10px; color: var(--text-muted); }

        .services-section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--accent); font-weight: 600; }
        select, input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; box-sizing: border-box; outline: none; }
        
        .price-box { text-align: center; padding: 15px; background: rgba(0,255,136,0.05); border-radius: 15px; margin-bottom: 20px; border: 1px dashed var(--accent); }
        .btn-main { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(22,27,34,0.95); display: flex; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-box" id="loginBox">
            <h2 style="color:var(--accent)">مرحباً بك في CD-CARD</h2>
            <p style="font-size:13px; color:var(--text-muted)">سجل دخولك للتمتع بخدماتنا</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button class="btn-main" onclick="login()">تسجيل الدخول 🔑</button>
            <p onclick="toggleAuth()" style="font-size:12px; cursor:pointer; margin-top:15px">ليس لديك حساب؟ <span style="color:var(--accent)">أنشئ حساباً الآن</span></p>
        </div><div class="auth-box" id="registerBox" style="display:none">
            <h2 style="color:var(--accent)">فتح حساب جديد</h2>
            <input type="text" id="regName" placeholder="الاسم بالكامل">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button class="btn-main" onclick="register()">إنشاء الحساب ✅</button>
            <p onclick="toggleAuth()" style="font-size:12px; cursor:pointer; margin-top:15px">لديك حساب؟ <span style="color:var(--accent)">دخول</span></p>
        </div>
    </div>

    <div id="mainApp" style="display:none">
        <div class="app-header">
            <div class="app-logo"></div>
            <div class="app-title">CD-Card</div>
        </div>

        <div id="homePage" class="page active">
            <div class="container">
                <h3 id="welcomeMsg" style="text-align:center; color:var(--accent); font-size:16px;">مرحباً بك..</h3>
                
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-title" id="uBalance">0.00</span>
                        <span class="stat-desc">رصيدك الحالي (د.ل)</span>
                    </div>
                    <div class="stat-card" onclick="copyRef()">
                        <span class="stat-title" style="font-size:11px;">نسخ الرابط</span>
                        <span class="stat-desc">رابط الإحالة (ربح 4%)</span>
                    </div>
                </div>

                <div class="services-section">
                    <div class="form-group"><label>الفئات</label><select id="catSelect" onchange="updateServiceList()"></select></div>
                    <div class="form-group"><label>الخدمات</label><select id="serviceSelect" onchange="updateServiceDetails()"></select></div>
                    <div class="form-group"><label>الرابط / الآيدي</label><input type="text" id="orderLink" placeholder="أدخل الرابط هنا..."></div>
                    <div class="form-group"><label>الكمية</label><input type="number" id="orderQty" oninput="calculateTotal()"></div>
                    <div class="price-box"><small>السعر المطلوب:</small><br><span id="totalPrice" style="color:var(--accent); font-size:24px; font-weight:bold;">0.00 د.ل</span></div>
                    <button class="btn-main" onclick="submitOrder()">تأكيد الطلب الآن ✅</button>
                </div>
            </div>
        </div>

        <div id="rechargePage" class="page">
            <div class="services-section">
                <h3 style="text-align:center; color:var(--accent);">💳 شحن الرصيد</h3>
                <div style="background:#000; padding:15px; border-radius:15px; border:1px solid var(--accent); text-align:center; margin-bottom:15px;">
                    <p style="margin:5px 0">مدار: <b>0912377291</b></p>
                    <p style="margin:5px 0">ليبيانا: <b>0920414760</b></p>
                </div>
                <input type="number" id="senderPhone" placeholder="رقمك المحول منه">
                <input type="number" id="chargeAmount" placeholder="القيمة بالدينار">
                <button class="btn-main" style="margin-top:15px" onclick="sendWhatsAppRecharge()">إرسال الإيصال واتساب 💬</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="nav('homePage', this)">🏠<br>الرئيسية</div>
            <div class="nav-item" onclick="nav('rechargePage', this)">💳<br>الشحن</div>
            <div class="nav-item" onclick="firebase.auth().signOut()">🚪<br>خروج</div>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjQyY_mu--mX6U_J2WOmhlC14akUlpqs8",
      authDomain: "cdcard104-a6184.firebaseapp.com",projectId: "cdcard104-a6184",
      storageBucket: "cdcard104-a6184.firebasestorage.app",
      messagingSenderId: "250091931039",
      appId: "1:250091931039:web:765ad3c175c184ac3ea9aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(); const auth = firebase.auth();

    let userData = {};

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                userData = doc.data();
                document.getElementById('welcomeMsg').innerText = مرحباً بك يا ${userData.username} في CD-CARD;
                document.getElementById('uBalance').innerText = Number(userData.balance || 0).toFixed(2);
                window.myRef = window.location.origin + window.location.pathname + "?ref=" + user.uid;
            });
            loadServices();
        } else {
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref') || "none";

        try {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.collection('users').doc(res.user.uid).set({
                username: name, balance: 0, spent: 0, invitedBy: ref
            });
        } catch (e) { alert(e.message); }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } catch (e) { alert("خطأ في البيانات"); }
    }

    async function loadServices() {
        const snap = await db.collection('services').get(); window.allServices = []; snap.forEach(doc => window.allServices.push({id: doc.id, ...doc.data()}));
        const cats = [...new Set(window.allServices.map(s => s.category))];
        const catS = document.getElementById('catSelect'); catS.innerHTML = "";
        cats.forEach(c => catS.innerHTML += <option value="${c}">${c}</option>);
        updateServiceList();
    }

    function updateServiceList() {
        const cat = document.getElementById('catSelect').value;
        const sS = document.getElementById('serviceSelect'); sS.innerHTML = "";
        window.allServices.filter(s => s.category === cat).forEach(s => sS.innerHTML += <option value="${s.id}">${s.name} - ${s.finalPrice} د.ل</option>);
        updateServiceDetails();
    }

    function updateServiceDetails() {
        window.selectedService = window.allServices.find(s => s.id === document.getElementById('serviceSelect').value);
        if(window.selectedService) { calculateTotal(); }
    }

    function calculateTotal() { 
        const q = parseFloat(document.getElementById('orderQty').value) || 0;
        const p = parseFloat(window.selectedService.finalPrice) || 0;
        const total = (window.selectedService.category.includes('ببجي') ? p : (q/1000)*p).toFixed(3);
        document.getElementById('totalPrice').innerText = total + " د.ل";
    }

    function copyRef() {
        navigator.clipboard.writeText(window.myRef);
        alert("✅ تم نسخ رابط الإحالة الخاص بك بنجاح!");
    }

    function toggleAuth() {
        const l = document.getElementById('loginBox'); const r = document.getElementById('registerBox');
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
        r.style.display = r.style.display === 'none' ? 'block' : 'none';
    }function nav(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
