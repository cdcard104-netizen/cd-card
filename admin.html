<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم CD-CARD | إدارة شاملة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; text-align: center; direction: rtl; }
        .section { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; max-width: 800px; margin: auto; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: #fff; text-align: center; font-size: 14px; }
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-update { background: #00ff88; color: #000; }
        .btn-manual { background: #218bff; color: #fff; }
        .service-item { background: #0d1117; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; text-align: right; }
        #status { margin-top: 15px; font-weight: bold; color: #00ff88; font-size: 14px; min-height: 20px; }
        .badge { background: #30363d; padding: 4px 8px; border-radius: 5px; font-size: 11px; color: #8b949e; margin-right: 5px; }
        .step-box { background: rgba(33, 139, 255, 0.1); padding: 15px; border-radius: 10px; text-align: right; font-size: 13px; border-right: 4px solid #218bff; margin-bottom: 15px; line-height: 1.6; }
    </style>
</head>
<body>

    <h2>🚀 إدارة متجر CD-CARD</h2>

    <div class="section">
        <h3>تحديث الخدمات (الربح 30%)</h3>
        <div class="step-box">
            1. افتح <a href="https://ms1.shop/api/v2?key=10ce1bb69e7485eb07cd008ea5875972&action=services" target="_blank" style="color:#218bff; font-weight:bold;">رابط المزود من هنا</a>.<br>
            2. اضغط <b>Ctrl + A</b> ثم <b>Ctrl + C</b> لنسخ كل الكلام.<br>
            3. الصق الكلام هنا واضغط الزر الأخضر.
        </div>
        <textarea id="jsonData" rows="4" placeholder="الصق النص البرمجي هنا..."></textarea>
        <button onclick="updateFromJSON()" id="upBtn" class="btn btn-update">بدء تحديث وتخزين الخدمات 🔄</button>
        <div id="status">جاهز للاستلام...</div>
    </div>

    <div class="section">
        <h3>➕ إضافة خدمة يدوية (رصيد ليبي)</h3>
        <input type="text" id="mName" placeholder="الاسم (مثلاً: رصيد مدار 10 د.ل)">
        <input type="text" id="mCat" placeholder="الفئة (مثلاً: شبكات ليبيا)">
        <input type="number" id="mPrice" placeholder="السعر بالدينار الليبي">
        <button onclick="addManual()" class="btn btn-manual">حفظ الخدمة اليدوية ✅</button>
    </div>

    <div class="section">
        <h3>البحث والتفعيل (إظهار للزبائن)</h3>
        <input type="text" id="search" placeholder="ابحث عن ببجي، انستقرام، رصيد..." onkeyup="filterServices()">
        <div id="list" style="margin-top: 20px;">جاري تحميل القائمة من Firebase...</div>
    </div>

<script>
    // إعدادات Firebase
    const firebaseConfig = { 
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
        authDomain: "cd-card-87365.firebaseapp.com", 
        projectId: "cd-card-87365", 
        storageBucket: "cd-card-87365.firebasestorage.app", 
        messagingSenderId: "397926299412", 
        appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دالة التحديث الذكية
    async function updateFromJSON() {
        const status = document.getElementById('status');
        const upBtn = document.getElementById('upBtn');
        const jsonInput = document.getElementById('jsonData').value;

        if (!jsonInput.trim()) return alert("الرجاء لصق البيانات أولاً!");
        status.innerText = "⏳ جاري معالجة البيانات وتنظيفها...";
        upBtn.disabled = true;

        try {
            // استخراج المصفوفة فقط لتجنب أخطاء التنسيق
            const start = jsonInput.indexOf('[');
            const end = jsonInput.lastIndexOf(']');
            if (start === -1 || end === -1) throw new Error("التنسيق غير صحيح، تأكد من نسخ النص كاملاً.");
            
            const cleanJson = jsonInput.substring(start, end + 1);
            const data = JSON.parse(cleanJson);
            
            let batch = db.batch();
            let count = 0;

            for (const s of data) {
                if (s.service && s.name) {
                    const ref = db.collection('services').doc(String(s.service));
                    const finalPrice = Number((parseFloat(s.rate) * 1.3).toFixed(2));
                    
                    batch.set(ref, { 
                        name: s.name, 
                        category: s.category, 
                        finalPrice: finalPrice,
                        apiId: s.service 
                    }, { merge: true });

                    count++;
                    if (count % 400 === 0) { 
                        await batch.commit(); 
                        batch = db.batch(); 
                        status.innerText = ⏳ تم رفع ${count} خدمة...;
                    }
                }
            }

            await batch.commit();
            status.innerHTML = ✅ تم التحديث! ${count} خدمة جاهزة الآن.;
            document.getElementById('jsonData').value = "";
            loadServices();
        } catch(e) { 
            status.innerHTML = <span style="color:#ff4d4d;">❌ خطأ: ${e.message}</span>;
            console.error(e);
        } finally {
            upBtn.disabled = false;
        }
    }

    // إضافة يدوية
    async function addManual() {
        const n = document.getElementById('mName').value;
        const c = document.getElementById('mCat').value;
        const p = document.getElementById('mPrice').value;
        if(!n  !c  !p) return alert("الرجاء ملء كافة البيانات");

        await db.collection('services').add({ 
            name: n, 
            category: c, 
            finalPrice: Number(p), 
            isVisible: true, 
            apiId: "manual" 
        });
        alert("✅ تمت الإضافة بنجاح");
        document.getElementById('mName').value = "";
        loadServices();
    }

    let allServices = [];
    async function loadServices() {
        const snap = await db.collection('services').get();
        allServices = [];
        snap.forEach(doc => allServices.push({id: doc.id, ...doc.data()}));
        render(allServices);
    }

    function render(data) {
        const listDiv = document.getElementById('list');
        if(data.length === 0) { listDiv.innerHTML = "لا توجد خدمات حالياً."; return; }
        listDiv.innerHTML = data.slice(0, 100).map(s => 
            <div class="service-item">
                <div>
                    <b>${s.name}</b> <span class="badge">${s.category}</span><br>
                    <small style="color:#00ff88;">${s.finalPrice} د.ل</small>
                </div>
                <input type="checkbox" ${s.isVisible ? 'checked' : ''} 
                       onchange="toggleVisibility('${s.id}', this.checked)" 
                       style="width:22px; height:22px; cursor:pointer;">
            </div>
        ).join('') + (data.length > 100 ? "<p>استخدم البحث لرؤية المزيد...</p>" : "");
    }

    function filterServices() {
        const val = document.getElementById('search').value.toLowerCase();
        const filtered = allServices.filter(s => s.name.toLowerCase().includes(val) || s.category.toLowerCase().includes(val));
        render(filtered);
    }

    async function toggleVisibility(id, status) {
        try {
            await db.collection('services').doc(id).update({ isVisible: status });
        } catch(e) { console.error(e); }
    }

    loadServices();
</script>
</body>
</html>
