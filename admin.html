<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم CD-CARD | التحديث اليدوي الذكي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; text-align: center; direction: rtl; }
        .section { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; max-width: 800px; margin-left: auto; margin-right: auto; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: #fff; text-align: center; }
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-update { background: #00ff88; color: #000; }
        .btn-manual { background: #218bff; color: #fff; }
        .service-item { background: #0d1117; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
        #status { margin-top: 15px; font-weight: bold; color: #00ff88; font-size: 14px; }
        .badge { background: #30363d; padding: 4px 8px; border-radius: 5px; font-size: 12px; color: #8b949e; }
        .step-box { background: rgba(0, 255, 136, 0.1); padding: 10px; border-radius: 10px; text-align: right; font-size: 13px; border-right: 4px solid #00ff88; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>🚀 لوحة تحكم CD-CARD (تحديث يدوي)</h2>

    <div class="section">
        <h3>تحديث الأسعار من المزود</h3>
        <div class="step-box">
            1. افتح <a href="https://ms1.shop/api/v2?key=10ce1bb69e7485eb07cd008ea5875972&action=services" target="_blank" style="color:#00ff88;">هذا الرابط</a> في صفحة جديدة.<br>
            2. اضغط (Ctrl + A) ثم (Ctrl + C) لنسخ كل الكلام.<br>
            3. الصق الكلام في الصندوق تحت واضغط "بدء التحديث".
        </div>
        <textarea id="jsonData" rows="4" placeholder="الصق كود الـ JSON هنا..."></textarea>
        <button onclick="updateFromJSON()" id="upBtn" class="btn btn-update">بدء تحديث الخدمات والأسعار 🔄</button>
        <div id="status">جاهز للاستلام...</div>
    </div>

    <div class="section">
        <h3>➕ إضافة خدمة يدوية (رصيد، بطاقات...)</h3>
        <input type="text" id="mName" placeholder="اسم الخدمة (مثلاً: رصيد مدار 10د.ل)">
        <input type="text" id="mCat" placeholder="الفئة (مثلاً: اتصالات ليبيا)">
        <input type="number" id="mPrice" placeholder="السعر النهائي للزبون">
        <button onclick="addManual()" class="btn btn-manual">حفظ الخدمة اليدوية ✅</button>
    </div>

    <div class="section">
        <h3>البحث والتحكم في الخدمات</h3>
        <input type="text" id="search" placeholder="ابحث عن خدمة لتفعيلها..." onkeyup="filterServices()">
        <div id="list" style="margin-top: 20px;">جاري تحميل القائمة...</div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
        authDomain: "cd-card-87365.firebaseapp.com", 
        projectId: "cd-card-87365", 
        storageBucket: "cd-card-87365.firebasestorage.app", 
        messagingSenderId: "397926299412", 
        appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دالة التحديث اليدوي (تحل مشكلة CORS)
    async function updateFromJSON() {
        const status = document.getElementById('status');
        const upBtn = document.getElementById('upBtn');
        const jsonInput = document.getElementById('jsonData').value;

        if (!jsonInput.trim()) return alert("الرجاء لصق البيانات أولاً!");

        status.innerText = "جاري المعالجة والرفع لـ Firebase... ⏳";
        upBtn.disabled = true;try {
            const data = JSON.parse(jsonInput);
            let batch = db.batch();
            let count = 0;

            for (const s of data) {
                const ref = db.collection('services').doc(String(s.service));
                const finalPrice = Number((parseFloat(s.rate) * 1.3).toFixed(3)); // ربح 30%
                
                batch.set(ref, { 
                    name: s.name, 
                    category: s.category, 
                    finalPrice: finalPrice,
                    apiId: s.service 
                }, { merge: true });

                count++;
                if (count % 450 === 0) { 
                    await batch.commit(); 
                    batch = db.batch(); 
                }
            }

            await batch.commit();
            status.innerHTML = "✅ تم بنجاح! تم تحديث " + count + " خدمة.";
            document.getElementById('jsonData').value = "";
            loadServices();
        } catch(e) { 
            status.innerHTML = "<span style='color:#ff4d4d;'>خطأ: تأكد من نسخ الكود كاملاً بشكل صحيح.</span>";
        } finally {
            upBtn.disabled = false;
        }
    }

    async function addManual() {
        const n = document.getElementById('mName').value;
        const c = document.getElementById('mCat').value;
        const p = document.getElementById('mPrice').value;
        if(!n  !c  !p) return alert("الرجاء ملء كافة البيانات");

        await db.collection('services').add({ name: n, category: c, finalPrice: Number(p), isVisible: true, apiId: "manual" });
        alert("تمت إضافة الخدمة اليدوية"); 
        loadServices();
    }

    let allServices = [];
    async function loadServices() {
        const snap = await db.collection('services').get();
        allServices = [];
        snap.forEach(doc => allServices.push({id: doc.id, ...doc.data()}));
        render(allServices);
    }

    function render(data) {
        document.getElementById('list').innerHTML = data.map(s => 
            <div class="service-item">
                <div style="text-align:right;"><b>${s.name}</b> <span class="badge">${s.category}</span><br><small>${s.finalPrice} د.ل</small></div>
                <input type="checkbox" ${s.isVisible ? 'checked' : ''} onchange="toggleVisibility('${s.id}', this.checked)" style="width:25px; height:25px;">
            </div>
        ).join('');
    }

    function filterServices() {
        const val = document.getElementById('search').value.toLowerCase();
        render(allServices.filter(s => s.name.toLowerCase().includes(val) || s.category.toLowerCase().includes(val)));
    }

    async function toggleVisibility(id, status) {
        await db.collection('services').doc(id).update({ isVisible: status });
    }

    loadServices();
</script>
</body>
</html>
