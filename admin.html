<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | CD-CARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .section { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: #fff; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .service-item { background: #0d1117; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <h2>إدارة CD-CARD 🚀</h2>

    <div class="section">
        <button onclick="updateFromAPI()" id="upBtn" class="btn" style="background:#00ff88; color:#000;">تحديث من ms1.shop (ربح 30%)</button>
        <div id="status"></div>
    </div>

    <div class="section" style="border-color: #218bff;">
        <h3>➕ إضافة خدمة يدوية</h3>
        <input type="text" id="mName" placeholder="اسم الخدمة">
        <input type="text" id="mCat" placeholder="الفئة">
        <input type="number" id="mPrice" placeholder="السعر النهائي">
        <button onclick="addManual()" class="btn" style="background:#218bff; color:#fff;">حفظ الخدمة</button>
    </div>

    <div class="section">
        <input type="text" id="search" placeholder="ابحث في الخدمات..." onkeyup="filterServices()">
        <div id="list">جاري التحميل...</div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", authDomain: "cd-card-87365.firebaseapp.com", projectId: "cd-card-87365", storageBucket: "cd-card-87365.firebasestorage.app", messagingSenderId: "397926299412", appId: "1:397926299412:web:efbe9ae9aae29df368f401" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function updateFromAPI() {
        const status = document.getElementById('status');
        status.innerText = "جاري الجلب...";
        try {
            const res = await fetch("https://cors-anywhere.herokuapp.com/https://ms1.shop/api/v2?key=bc34ac73c612e956734842221d87df60&action=services");
            const data = await res.json();
            let batch = db.batch();
            data.forEach(s => {
                const ref = db.collection('services').doc(String(s.service));
                batch.set(ref, { name: s.name, category: s.category, finalPrice: Number((s.rate * 1.3).toFixed(2)), isVisible: false }, {merge: true});
            });
            await batch.commit();
            status.innerText = "✅ اكتمل التحديث";
            loadServices();
        } catch(e) { status.innerText = "خطأ: تأكد من CORS"; }
    }

    async function addManual() {
        const n = document.getElementById('mName').value;
        const c = document.getElementById('mCat').value;
        const p = document.getElementById('mPrice').value;
        await db.collection('services').add({ name: n, category: c, finalPrice: Number(p), isVisible: true });
        alert("تمت الإضافة"); loadServices();
    }

    let all = [];
    async function loadServices() {
        const snap = await db.collection('services').get();
        all = []; snap.forEach(doc => all.push({id: doc.id, ...doc.data()}));
        render(all);
    }

    function render(data) {
        document.getElementById('list').innerHTML = data.map(s => `
            <div class="service-item">
            <div style="text-align:right;"><b>${s.name}</b><br><small>${s.finalPrice} د.ل</small></div>
                <input type="checkbox" ${s.isVisible?'checked':''} onchange="toggle('${s.id}', this.checked)" style="width:20px; height:20px;">
            </div>
        `).join('');
    }

    function filterServices() {
        const v = document.getElementById('search').value.toLowerCase();
        render(all.filter(s => s.name.toLowerCase().includes(v)));
    }

    async function toggle(id, st) { await db.collection('services').doc(id).update({isVisible: st}); }

    loadServices();
</script>
</body>
</html>
