<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة CD-CARD | الحل النهائي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .section { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; max-width: 600px; margin: auto; }
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; background: #00ff88; color: #000; font-size: 16px; }
        #status { margin-top: 20px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); font-family: monospace; }
        .service-item { background: #0d1117; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; border: 1px solid #30363d; font-size: 13px; }
    </style>
</head>
<body>

    <h2>🚀 إدارة متجر CD-CARD</h2>

    <div class="section">
        <h3>تحديث تلقائي (عبر السيرفر)</h3>
        <p style="font-size: 12px; color: #8b949e;">هذا الزر سيجلب الخدمات مباشرة لـ Firebase</p>
        <button onclick="forceUpdate()" id="upBtn" class="btn">ابدأ جلب الخدمات الآن 🔄</button>
        <div id="status">في انتظار الضغط على الزر...</div>
    </div>

    <div class="section">
        <input type="text" id="search" placeholder="ابحث في الخدمات المضافة..." onkeyup="loadFromDB()" style="width: 90%; padding: 10px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #30363d;">
        <div id="list" style="margin-top: 15px; text-align: right;"></div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyARNJOPAycWU3YJdZSBN1d9uoLrvso3i4Y", 
        authDomain: "cd-card-87365.firebaseapp.com", 
        projectId: "cd-card-87365", 
        storageBucket: "cd-card-87365.firebasestorage.app", 
        messagingSenderId: "397926299412", 
        appId: "1:397926299412:web:efbe9ae9aae29df368f401" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function forceUpdate() {
        const status = document.getElementById('status');
        const btn = document.getElementById('upBtn');
        btn.disabled = true;
        status.innerHTML = "⌛ جاري الاتصال بالمزود (عبر AllOrigins)...";

        const apiKey = "10ce1bb69e7485eb07cd008ea5875972";
        const url = https://ms1.shop/api/v2?key=${apiKey}&action=services;
        
        try {
            // استخدام بروكسي AllOrigins بطريقة أكثر استقراراً
            const response = await fetch(https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()});
            const json = await response.json();
            const services = JSON.parse(json.contents);

            if (!Array.isArray(services)) throw new Error("لم يتم استلام مصفوفة خدمات.");

            status.innerHTML = ✅ تم جلب ${services.length} خدمة. جاري الرفع لـ Firebase...;

            let batch = db.batch();
            let count = 0;

            for (const s of services) {
                const ref = db.collection('services').doc(String(s.service));
                batch.set(ref, {
                    name: s.name,
                    category: s.category,
                    finalPrice: Number((parseFloat(s.rate) * 1.3).toFixed(2)),
                    apiId: s.service
                }, { merge: true });

                count++;
                if (count % 400 === 0) {
                    await batch.commit();
                    batch = db.batch();
                    status.innerHTML = ⏳ تم رفع ${count} خدمة...;}
            }
            await batch.commit();
            status.innerHTML = 🎊 مبروك! تم تحديث ${count} خدمة بنجاح.;
            loadFromDB();
        } catch (e) {
            status.innerHTML = <span style="color:#ff4d4d;">❌ فشل: ${e.message}</span>;
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    async function loadFromDB() {
        const snap = await db.collection('services').limit(50).get();
        let html = "";
        snap.forEach(doc => {
            const s = doc.data();
            html += <div class="service-item">
                <span>${s.name}</span>
                <input type="checkbox" ${s.isVisible?'checked':''} onchange="toggle('${doc.id}', this.checked)">
            </div>;
        });
        document.getElementById('list').innerHTML = html;
    }

    async function toggle(id, val) {
        await db.collection('services').doc(id).update({ isVisible: val });
    }

    loadFromDB();
</script>
</body>
</html>
