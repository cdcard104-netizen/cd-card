<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديث الخدمات | CD-CARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body style="background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 50px;">

    <h2>تحديث خدمات متجر CD-CARD 🚀</h2>
    <p>المزود: ms1.shop | الربح المضاف: 25% | النظام: Firebase Firestore</p>
    
    <button id="uploadBtn" style="padding: 15px 30px; background: #00ff88; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; color: #000;">
        ابدأ جلب وتحديث الخدمات الآن
    </button>

    <div id="status" style="margin-top: 25px; color: #8b949e; font-size: 14px; line-height: 1.6;"></div>

<script>
    // إعدادات Firebase الخاصة بمتجرك CD-CARD (تم تحديثها بناءً على صورك)
    const firebaseConfig = { 
        apiKey: "AIzaSyCjQyY_mu--mX6U_J2WOmhlC14akUlpqs8", 
        authDomain: "cdcard104-a6184.firebaseapp.com", 
        projectId: "cdcard104-a6184", 
        storageBucket: "cdcard104-a6184.firebasestorage.app", 
        messagingSenderId: "250091931039", 
        appId: "1:250091931039:web:765ad3c175c184ac3ea9aa" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('uploadBtn').onclick = async () => {
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerHTML = "جاري الاتصال بالمزود...<br><small>تأكد من تفعيل زر CORS من الرابط المعتاد</small>";

        // بيانات API الخاصة بك (ms1.shop)
        const apiKey = "65fcbb5ab3fd6a23cb48d1b7d0300a0b"; 
        const apiUrl = https://ms1.shop/api/v2?key=${apiKey}&action=services;
        const proxy = "https://cors-anywhere.herokuapp.com/";

        try {
            const response = await fetch(proxy + apiUrl);
            const services = await response.json();
            
            if (!Array.isArray(services)) {
                throw new Error("استجابة المزود غير صحيحة، تأكد من مفتاح الـ API الخاص بك");
            }

            status.innerHTML = تم جلب ${services.length} خدمة بنجاح.<br>جاري التخزين في Firebase بربح 25%...;

            let batch = db.batch();
            let count = 0;

            for (const s of services) {
                // نستخدم رقم الخدمة كـ ID للمستند لمنع التكرار
                const serviceRef = db.collection('services').doc(String(s.service));
                
                // حساب السعر مع زيادة 25% (الضرب في 1.25)
                const originalPrice = parseFloat(s.rate) || 0;
                const finalPrice = originalPrice * 1.25;

                batch.set(serviceRef, {
                    apiId: s.service,
                    name: s.name,
                    category: s.category,
                    min: Number(s.min) || 0,
                    max: Number(s.max) || 0,
                    originalPrice: Number(originalPrice.toFixed(4)),
                    finalPrice: Number(finalPrice.toFixed(4)),
                    type: s.type || "Default",
                    isVisible: false // افتراضياً مخفية حتى تفعلها أنت
                }, { merge: true });

                count++;

                // رفع الخدمات على مجموعات (كل 400 خدمة في Batch واحد)
                if (count % 400 === 0) {
                    await batch.commit();
                    batch = db.batch();
                    status.innerHTML = تم رفع ${count} خدمة... يرجى الانتظار;
                }
            }

            await batch.commit();
            status.innerHTML = ✅ تم بنجاح يا محمد!<br>تم تحديث ${count} خدمة في قاعدة بيانات CD-CARD بربح 25%.;
            btn.style.background = "#218bff";
            btn.innerText = "اكتمل التحديث بنجاح";} catch (error) {
            console.error(error);
            status.innerHTML = "❌ خطأ: " + error.message + "<br>تأكد من الضغط على زر التفعيل في <a href='https://cors-anywhere.herokuapp.com/corsdemo' target='_blank' style='color:#00ff88'>CORS Anywhere</a> ثم حاول مجدداً.";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
