<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد | CD-CARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #30363d; background: #000; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#00ff88;">إنشاء حساب جديد</h2>
        <input type="text" id="regName" placeholder="الاسم بالكامل">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button class="btn" onclick="register()">تسجيل الآن ✅</button>
        <p id="msg" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjQyY_mu--mX6U_J2WOmhlC14akUlpqs8",
      authDomain: "cdcard104-a6184.firebaseapp.com",
      projectId: "cdcard104-a6184",
      storageBucket: "cdcard104-a6184.firebasestorage.app",
      messagingSenderId: "250091931039",
      appId: "1:250091931039:web:765ad3c175c184ac3ea9aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(); const auth = firebase.auth();

    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        
        // قراءة معرف الشخص اللي بعت الرابط من عنوان الصفحة
        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref') || "none";

        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
            const user = userCredential.user;

            // إنشاء بيانات المستخدم وحفظ من هو الشخص الذي دعاه
            await db.collection('users').doc(user.uid).set({
                username: name,
                email: email,
                balance: 0,
                spent: 0,
                invitedBy: referrerId, // هنا يتم حفظ رابط الربح
                regDate: new Date().toLocaleString('ar-LY')
            });

            alert("تم التسجيل بنجاح!");
            window.location.href = "index.html";
        } catch (error) {
            document.getElementById('msg').innerText = "خطأ: " + error.message;
        }
    }
</script>
</body>
</html>
